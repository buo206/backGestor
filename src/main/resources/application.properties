spring.application.name=backGestor
server.port=8096
server.address=0.0.0.0

spring.datasource.url=jdbc:mysql://localhost:3306/gestor?useSSL=false&serverTimezone=Europe/Madrid&allowPublicKeyRetrieval=true
spring.datasource.username=GESTOR
spring.datasource.password=GESTOR
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
