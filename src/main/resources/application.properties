spring.application.name=backGestor
server.port=8096

spring.datasource.url=jdbc:mysql://localhost:3306/gestor?useSSL=false&serverTimezone=Europe/Madrid&allowPublicKeyRetrieval=truespring.datasource.username=GESTOR
spring.datasource.password=GESTOR

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================
# JPA / HIBERNATE
# ============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ============================
# LOGGING (opcional)
# ============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
